services:
  - type: web
    name: crypto-trading-secure-24
    env: node
    plan: free
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run server
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DISABLE_MARKET_WS
        value: "1"
      - key: SERVER_JWT_SECRET
        generateValue: true
      - key: VITE_API_URL
        value: ""
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false

