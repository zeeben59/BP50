services:
  - type: web
    name: crypto-trading-secure-24
    env: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run server
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DISABLE_MARKET_WS
        value: "1"
      - key: SERVER_JWT_SECRET
        generateValue: true
      - key: VITE_API_URL
        value: ""
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
